version: "3.9"

services:

  mcp:
    build: .
    container_name: mcp-server

    env_file:
      - .env

    ports:
      - "24000:24000"

    restart: unless-stopped

  n8n:
    image: n8nio/n8n

    container_name: n8n

    ports:
      - "5678:5678"

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      - mcp

    restart: unless-stopped

volumes:
  n8n_data: